<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tra cứu thông tin thiết bị - HEM</title>
  <!-- Nhúng thư viện quét mã QR -->
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    /* --- CẤU TRÚC CHUNG --- */
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      scroll-behavior: smooth;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #f0f2f5;
      padding: 15px;
    }

    #container {
      width: 100%;
      max-width: 480px;
      padding: 25px;
      background-color: white;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      text-align: center;
    }

    #company-name {
      font-weight: 800;
      text-transform: uppercase;
      color: #1c3d5a;
      font-size: 18px;
      margin-bottom: 15px;
      line-height: 1.4;
    }

    #logo {
      width: auto;
      max-width: 150px;
      height: auto;
      max-height: 80px;
      margin-bottom: 20px;
    }

    h2.page-title {
      color: #ff6622;
      font-size: 22px;
      font-weight: bold;
      margin: 0 0 20px;
    }

    /* --- Ô NHẬP LIỆU CÓ NÚT QUÉT --- */
    .input-wrapper {
      position: relative;
      width: 100%;
      margin-bottom: 15px;
    }

    input[type="text"] {
      width: 100%;
      padding: 14px 50px 14px 14px;
      border: 2px solid #e1e4e8;
      border-radius: 10px;
      font-size: 16px;
      transition: border-color 0.3s;
      appearance: none;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #4285F4;
    }

    #scan-trigger {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #scan-trigger svg {
      fill: #4285F4;
      width: 30px;
      height: 30px;
    }

    /* --- GIAO DIỆN QUÉT MÃ (MODAL) --- */
    #scanner-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      z-index: 1000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #reader {
      width: 90%;
      max-width: 400px;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid #555;
    }

    #close-scanner {
      margin-top: 30px;
      padding: 12px 40px;
      background: #ff4444;
      color: white;
      border: none;
      border-radius: 30px;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
    }

    /* --- NÚT BẤM --- */
    #button-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      display: block;
      padding: 15px;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn:active { transform: scale(0.97); opacity: 0.9; }
    #search-button { background-color: #4285F4; }
    .support-button { background-color: #34A853; }

    /* --- TRẠNG THÁI & KẾT QUẢ (CẬP NHẬT) --- */
    #status { margin-top: 15px; font-size: 14px; color: #666; min-height: 1.2em; }
    
    #results {
      margin-top: 20px;
      text-align: left;
      border-top: 1px solid #eee;
      padding-top: 20px;
    }

    .result-item {
      margin-bottom: 15px;
      font-size: 16px;
      line-height: 1.6;
      color: #333;
    }

    /* Định dạng cho phần in đậm */
    .result-item strong {
      color: #000;
      font-weight: 700;
    }

    /* Định dạng cho phần mô tả in nghiêng xuống dòng */
    .description-content {
      display: block;
      margin-top: 5px;
      color: #555;
      font-style: italic;
      white-space: pre-wrap; /* Giữ nguyên các dấu xuống dòng trong mô tả */
    }

    #pages-container { margin-top: 20px; text-align: left; border-top: 1px solid #eee; padding-top: 15px; }
    .pages-list a { text-decoration: none; color: #0077cc; font-size: 15px; display: block; padding: 8px 0; }
    #footer { margin-top: 25px; padding-top: 15px; border-top: 1px solid #eee; font-size: 12px; color: #aaa; }

    @media (max-width: 480px) {
      body { align-items: flex-start; padding: 0; background-color: white; }
      #container { border-radius: 0; box-shadow: none; padding: 20px; }
    }
  </style>
</head>

<body>
  <!-- Modal Quét Mã -->
  <div id="scanner-modal">
    <div id="reader"></div>
    <button id="close-scanner" onclick="stopScanner()">HỦY BỎ</button>
  </div>

  <div id="container">
    <div id="company-name">CÔNG TY CỔ PHẦN CHẾ TẠO ĐIỆN CƠ HEM</div>
    <img src="https://hem.com.vn/wp-content/uploads/2024/04/Blue-Logo.png" alt="Logo HEM" id="logo" onerror="this.style.display='none'">
    
    <h2 class="page-title">Tra cứu thông tin thiết bị</h2>
    
    <div class="input-wrapper">
      <input type="text" id="deviceIdInput" placeholder="Nhập mã hoặc quét QR..." inputmode="text">
      <button id="scan-trigger" onclick="startScanner()" title="Quét mã QR">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 4h4.832c.552 0 1-.448 1-1s-.448-1-1-1H4C2.895 2 2 2.895 2 4v4.832c0 .552.448 1 1 1s1-.448 1-1V4zm16 0h-4.832c-.552 0-1-.448-1-1s-.448-1 1-1H20c1.105 0 2 .895 2 4v4.832c0 .552.448 1-1 1s-1-.448-1-1V4zM4 20h4.832c.552 0 1 .448 1 1s-.448 1-1 1H4c-1.105 0-2-.895-2-4v-4.832c0-.552.448-1 1-1s1 .448 1 1V20zm16 0h-4.832c-.552 0-1 .448-1 1s-.448 1-1 1H20c1.105 0 2-.895 2-4v-4.832c0-.552-.448-1-1-1s-1 .448-1 1V20zM7 7h4v4H7V7zm6 0h4v4h-4V7zm0 6h4v4h-4v-4zm-6 0h4v4H7v-4z"/>
        </svg>
      </button>
    </div>
    
    <div id="button-group">
      <button id="search-button" class="btn" onclick="searchDevice()">TRA CỨU</button>
      <a href="#" id="support-link" class="btn support-button" onclick="openSupportForm(event)">HỖ TRỢ / BÁO HỎNG</a>
    </div>

    <div id="status"></div>
    <div id="results">Quét mã QR hoặc nhập mã số thiết bị để xem thông tin.</div>
    
    <div id="pages-container">
      <div class="pages-list">
        <strong>Thông tin hữu ích:</strong>
        <ul>
          <li><a href="guide.html">➔ Hướng dẫn sử dụng thiết bị</a></li>
          <li><a href="terms.html">➔ Quy định quản lý tài sản</a></li>
        </ul>
      </div>
    </div>
    
    <div id="footer">Ứng dụng được phát triển bởi Bộ phận CNTT HEM EMM</div>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxhgQXWtrvCIaVJejEDoEbbD5eWfpA6KvvwouCAYlA_PjlfyXi14R0QNh8AQxPNMxeHkg/exec";
    let html5QrCode;

    function extractId(input) {
      if (!input) return "";
      const value = input.trim();
      if (value.includes('/21/')) {
        try {
          return value.split('/21/')[1].split('?')[0].split('#')[0];
        } catch (e) {
          return value;
        }
      }
      return value;
    }

    async function startScanner() {
      const modal = document.getElementById('scanner-modal');
      modal.style.display = 'flex';
      html5QrCode = new Html5Qrcode("reader");
      const config = { fps: 15, qrbox: { width: 250, height: 250 } };

      try {
        await html5QrCode.start(
          { facingMode: "environment" },
          config,
          (decodedText) => {
            const id = extractId(decodedText);
            document.getElementById('deviceIdInput').value = id;
            stopScanner();
            searchDevice();
          }
        );
      } catch (err) {
        alert("Lỗi: Không thể truy cập Camera.");
        stopScanner();
      }
    }

    function stopScanner() {
      const modal = document.getElementById('scanner-modal');
      if (html5QrCode && html5QrCode.isScanning) {
        html5QrCode.stop().then(() => {
          modal.style.display = 'none';
          html5QrCode.clear();
        }).catch(() => {
          modal.style.display = 'none';
        });
      } else {
        modal.style.display = 'none';
      }
    }

    /**
     * HÀM HIỂN THỊ KẾT QUẢ ĐÃ ĐƯỢC CẬP NHẬT ĐỊNH DẠNG
     */
    async function searchDevice() {
      const inputField = document.getElementById('deviceIdInput');
      const deviceId = extractId(inputField.value);
      const statusDiv = document.getElementById('status');
      const resultsDiv = document.getElementById('results');

      if (!deviceId) {
        statusDiv.innerHTML = 'Vui lòng nhập mã thiết bị.';
        return;
      }

      inputField.value = deviceId; 
      statusDiv.innerHTML = 'Đang truy xuất dữ liệu...';
      resultsDiv.innerHTML = '';

      try {
        const response = await fetch(`${WEB_APP_URL}?id=${encodeURIComponent(deviceId)}`);
        const result = await response.json();
        statusDiv.innerHTML = '';

        if (result.status === 'success') {
          // Xây dựng nội dung hiển thị theo yêu cầu mới
          let html = `<div class="result-item">Loại thiết bị: <strong>${result.type || 'N/A'}</strong></div>`;
          html += `<div class="result-item">Sử dụng/Quản lý: <strong>${result.user || 'N/A'}</strong></div>`;
          html += `<div class="result-item">Mô tả / Thông số kỹ thuật:<br><span class="description-content"><em>${result.description || 'Chưa có mô tả'}</em></span></div>`;
          
          resultsDiv.innerHTML = html;
        } else {
          resultsDiv.innerHTML = `<p style="color:#d93025; font-weight:bold;">Mã ${deviceId} không tồn tại trên hệ thống.</p>`;
        }
      } catch (error) {
        statusDiv.innerHTML = '';
        resultsDiv.innerHTML = `<p style="color:#d93025;">Lỗi kết nối máy chủ dữ liệu.</p>`;
      }
    }

    function openSupportForm(event) {
      event.preventDefault();
      const deviceId = extractId(document.getElementById('deviceIdInput').value);
      if (!deviceId) {
        alert('Vui lòng nhập mã thiết bị trước.');
        return;
      }
      const baseFormUrl = 'https://docs.google.com/forms/d/e/1FAIpQLSdq4dOqfso_jYJudquLU7SNNN39EX0fPLzWWG9-dhDjWWlrHQ/viewform?usp=dialog';
      const finalUrl = `${baseFormUrl}&entry.621171861=${encodeURIComponent(deviceId)}`;
      window.open(finalUrl, '_blank');
    }

    document.addEventListener('DOMContentLoaded', function() {
      const inputField = document.getElementById('deviceIdInput');
      const urlParams = new URLSearchParams(window.location.search);
      let foundId = urlParams.get('id');
      const qParam = urlParams.get('q');
      const currentUrl = window.location.href;

      if (qParam && qParam.includes('/21/')) foundId = extractId(qParam);
      else if (currentUrl.includes('/21/')) foundId = extractId(currentUrl);

      if (foundId) {
        inputField.value = foundId;
        searchDevice();
      }

      inputField.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          inputField.blur();
          searchDevice();
        }
      });
    });
  </script>
</body>

</html>
